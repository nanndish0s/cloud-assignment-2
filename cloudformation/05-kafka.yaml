AWSTemplateFormatVersion: '2010-09-09'
Description: AeroLink - EC2 Kafka broker running Kafka + Zookeeper via Docker Compose

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access to the Kafka instance
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the Kafka EC2 instance in
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Amazon Linux 2 AMI (auto-resolved via SSM)

Resources:

  KafkaInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - Fn::ImportValue: AeroLink-KafkaSgId
      Tags:
        - Key: Name
          Value: aerolink-kafka
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y docker
          service docker start
          usermod -a -G docker ec2-user

          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)

          mkdir -p /opt/kafka
          cat > /opt/kafka/docker-compose.yml << COMPOSE
          services:
            zookeeper:
              image: confluentinc/cp-zookeeper:6.2.0
              restart: always
              environment:
                ZOOKEEPER_CLIENT_PORT: 2181
                ZOOKEEPER_TICK_TIME: 2000
                KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"

            kafka:
              image: confluentinc/cp-kafka:6.2.0
              restart: always
              depends_on: [zookeeper]
              ports:
                - "9092:9092"
              environment:
                KAFKA_BROKER_ID: 1
                KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
                KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${PRIVATE_IP}:9092
                KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
                KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
          COMPOSE

          cd /opt/kafka && docker compose up -d

Outputs:
  KafkaPrivateIp:
    Value: !GetAtt KafkaInstance.PrivateIp
    Export:
      Name: AeroLink-KafkaPrivateIp

  KafkaBroker:
    Value: !Sub '${KafkaInstance.PrivateIp}:9092'
    Export:
      Name: AeroLink-KafkaBroker
