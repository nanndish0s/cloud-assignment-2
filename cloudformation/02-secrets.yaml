AWSTemplateFormatVersion: '2010-09-09'
Description: AeroLink - AWS Secrets Manager secrets for sensitive credentials

Parameters:
  DbPassword:
    Type: String
    NoEcho: true
    Description: RDS PostgreSQL master password
  DbUser:
    Type: String
    Default: aerouser
    Description: RDS PostgreSQL master username
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret shared by auth-service and api-gateway
  AdminPassword:
    Type: String
    NoEcho: true
    Description: Initial admin account password seeded by auth-service

Resources:

  DbPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: aerolink/db-password
      Description: AeroLink RDS PostgreSQL password
      SecretString: !Ref DbPassword

  DbUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: aerolink/db-user
      Description: AeroLink RDS PostgreSQL username
      SecretString: !Ref DbUser

  JwtSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: aerolink/jwt-secret
      Description: AeroLink JWT signing key
      SecretString: !Ref JwtSecret

  AdminPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: aerolink/admin-password
      Description: AeroLink admin seed password
      SecretString: !Ref AdminPassword

Outputs:
  DbPasswordSecretArn:
    Value: !Ref DbPasswordSecret
    Export:
      Name: AeroLink-DbPasswordSecretArn

  DbUserSecretArn:
    Value: !Ref DbUserSecret
    Export:
      Name: AeroLink-DbUserSecretArn

  JwtSecretArn:
    Value: !Ref JwtSecretSecret
    Export:
      Name: AeroLink-JwtSecretArn

  AdminPasswordSecretArn:
    Value: !Ref AdminPasswordSecret
    Export:
      Name: AeroLink-AdminPasswordSecretArn
